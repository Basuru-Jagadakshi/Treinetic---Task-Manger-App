<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-shadow border-0">
                <div class="card-body p-5">
                    <div class="text-center mb-4">
                        <i class="fas fa-user-plus text-primary fs-1 mb-2"></i>
                        <h3 class="fw-bold">Create Account</h3>
                        <p class="text-muted">Start managing your tasks today</p>
                    </div>

                    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
                    <div *ngIf="success" class="alert alert-success">{{ success }}</div>

                    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Username</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                                <input type="text" class="form-control bg-light" formControlName="username"
                                    placeholder="Choose a username"
                                    [ngClass]="{ 'is-invalid': registerForm.get('username')?.touched && registerForm.get('username')?.invalid }">
                                <div class="invalid-feedback">Username must be at least 3 characters</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Password</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                                <input type="password" class="form-control bg-light" formControlName="password"
                                    placeholder="Choose a secure password"
                                    [ngClass]="{ 'is-invalid': registerForm.get('password')?.touched && registerForm.get('password')?.invalid }">
                                <div class="invalid-feedback">Password must be at least 6 characters</div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 py-2 fw-bold"
                            [disabled]="registerForm.invalid">
                            <i class="fas fa-user-plus me-2"></i> Register
                        </button>

                        <div class="text-center mt-4">
                            <span class="text-muted">Already have an account? </span>
                            <a routerLink="/login" class="text-decoration-none fw-bold">Login here</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

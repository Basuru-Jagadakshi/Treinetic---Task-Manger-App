<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card card-shadow border-0">
        <div class="card-body p-5">
          <div class="text-center mb-4">
            <i class="fas fa-check-circle text-primary fs-1 mb-2"></i>
            <h3 class="fw-bold">Welcome Back</h3>
            <p class="text-muted">Login to manage your tasks</p>
          </div>

          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="mb-3">
              <label class="form-label fw-bold">Username</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-user"></i></span>
                <input type="text" class="form-control bg-light" formControlName="username" placeholder="Enter username"
                  [ngClass]="{ 'is-invalid': loginForm.get('username')?.touched && loginForm.get('username')?.invalid }">
                <div class="invalid-feedback">Username is required</div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-bold">Password</label>
              <div class="input-group">
                <span class="input-group-text bg-light"><i class="fas fa-lock"></i></span>
                <input type="password" class="form-control bg-light" formControlName="password" placeholder="Enter password"
                  [ngClass]="{ 'is-invalid': loginForm.get('password')?.touched && loginForm.get('password')?.invalid }">
                <div class="invalid-feedback">Password is required</div>
              </div>
            </div>

            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold" [disabled]="loginForm.invalid">
              <i class="fas fa-sign-in-alt me-2"></i> Login
            </button>

            <div class="text-center mt-4">
              <span class="text-muted">Don't have an account? </span>
              <a routerLink="/register" class="text-decoration-none fw-bold">Register here</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

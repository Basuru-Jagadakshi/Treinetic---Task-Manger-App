<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2><i class="fas fa-tasks text-primary me-2"></i>My Tasks</h2>
        <a routerLink="/tasks/new" class="btn btn-primary fw-bold">
            <i class="fas fa-plus me-1"></i> New Task
        </a>
    </div>

    <div class="card card-shadow border-0 mb-4">
        <div class="card-body bg-light rounded d-flex align-items-center">
            <i class="fas fa-filter text-muted me-2"></i>
            <label class="fw-bold me-2 mb-0">Filter by Status:</label>
            <select class="form-select w-auto" [(ngModel)]="statusFilter" (change)="applyFilter()">
                <option value="ALL">All Tasks</option>
                <option value="TO_DO">To Do</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="DONE">Done</option>
            </select>
        </div>
    </div>

    <div class="row" *ngIf="filteredTasks.length > 0; else noTasks">
        <div class="col-md-6 col-lg-4 mb-4" *ngFor="let task of filteredTasks">
            <div class="card card-shadow h-100 border-0">
                <div class="card-body d-flex flex-column">
                    <div class="d-flex justify-content-between align-items-start mb-2">
                        <h5 class="card-title fw-bold mb-0 text-truncate" [title]="task.title" style="max-width: 75%;">
                            {{ task.title }}
                        </h5>
                        <span class="badge" [ngClass]="getStatusBadgeClass(task.status)">
                            {{ formatStatus(task.status) }}
                        </span>
                    </div>
                    <p class="card-text text-muted mb-3 flex-grow-1"
                        style="font-size: 0.95rem; min-height: 2.85rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">
                        {{ task.description || 'No description provided.' }}
                    </p>
                    <div class="d-flex justify-content-between align-items-center mt-auto">
                        <small class="text-muted"><i class="far fa-clock me-1"></i>{{ task.createdAt | date:'shortDate'
                            }}</small>
                        <div class="btn-group btn-group-sm">
                            <a [routerLink]="['/tasks/edit', task.id]" class="btn btn-outline-primary"
                                title="Edit Task">
                                <i class="fas fa-edit"></i>
                            </a>
                            <button (click)="deleteTask(task.id)" class="btn btn-outline-danger" title="Delete Task">
                                <i class="fas fa-trash-alt"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <ng-template #noTasks>
        <div class="text-center py-5">
            <i class="fas fa-clipboard-list fa-4x text-muted mb-3 opacity-50"></i>
            <h4 class="text-muted">No tasks found</h4>
            <p class="text-muted">You haven't added any tasks yet or none match your filter.</p>
        </div>
    </ng-template>
</div>

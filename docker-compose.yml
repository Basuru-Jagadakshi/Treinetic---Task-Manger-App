version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: task_manager_db
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: task_manager_dev
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: task_manager_backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/task_manager_dev?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: task_manager_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  mysql_data:
